# Cloudflare Pages config for pnake.
#
#   pnpm deploy           build + push to the pnake Pages project
#   wrangler pages dev    serve dist/ locally on a CF-compatible runtime
#
# The custom domain (pnake.sa2taka.com) is configured via the Cloudflare
# dashboard; wrangler itself doesn't manage that mapping. The project
# name "pnake" here has to match the project on Cloudflare.

name = "pnake"
pages_build_output_dir = "dist"
compatibility_date = "2026-05-13"
